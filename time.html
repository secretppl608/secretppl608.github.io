<!doctype html>
<html lang="zh">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>计时器页面</title>
    <style>
        @font-face {
            font-family: "num";
            src: url("./assets/unispace-bd-3.ttf");
        }

        #time-box {
            font-family: "num";
            font-size: 40px;
            display: flex;
            gap: 35px;

            & div.t {
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 5px;
                position: relative;
                background-color: black;
                color: white;
                box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
                padding: 10px;
                width: 100%;
                height: 100%;
            }

            & .c {
                position: relative;
                width: 50px;
                height: 80px;
                display: flex;
                flex-direction: column;

                &:not(:first-of-type)::before {
                    content: ":";
                    position: absolute;
                    top: 30%;
                    left: -20px;
                }

                & .w {
                    position: absolute;
                    top: 55%;
                    width: calc(100% + 15px);
                    background-color: black;
                    height: 2px;
                }
            }
        }

        .u {
            position: absolute;
            bottom: 2px;
            left: 55%;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        code {
            background-color: gainsboro;
            border: 1px dashed black;
            padding: 10px;
            display: inline-block;
            width: 90vw;
            position: relative;
            top: 10px;
            margin-top: 30px;

            &::before {
                content: '如果您是neo-t分站的职员，请将以下内容复制到评论区';
                display: block;
                position: relative;
                bottom: 30px;
            }
        }

        #tips.will{
            color: green;
            &.has {
                color: red;
            }
        }
    </style>
</head>

<body>
    <div id="control">
        <h1>
            <a href="https://backrooms-neo-t-wiki.wikidot.com">The Backrooms Neo-t</a>
            分部倒计时工具
        </h1>
        <h2>
            作者：olysad,本站点技术<a href="https://backrooms-neo-t-wiki.wikidot.com/meet-the-staff">职员</a>
        </h2>
        <form id="ct">
            <fieldset>
                <legend>模式选择</legend>
                <label for="cd">一般删除</label><input type="radio" id="cd" value="cd" name="mode" />
                ——
                <label for="ld">长期低分</label><input type="radio" id="ld" value="ld" name="mode" />
                ——
                <label for="fj">封禁计时</label><input type="radio" id="fj" value="fj" name="mode" />
            </fieldset>
            <fieldset>
                <legend>条目分数</legend>
                <label for="f1">-2</label><input type="radio" id="f1" value="f1" name="point" />
                <label for="f2">-10</label><input type="radio" id="f2" value="f2" name="point" />
                <label for="f3">-30</label><input type="radio" id="f3" value="f3" name="point" />
            </fieldset>
            <fieldset>
                <legend>选择日期</legend>
                <input type="datetime-local" name="dt" id="dt" />
            </fieldset>
            <button type="submit" id="cts">生成</button>
        </form>
        <script>
            let code = null;
            document.getElementById("ct").addEventListener(
                "submit",
                (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    make(e);
                },
                {
                    capture: false,
                },
            );
            document.getElementById("cts").addEventListener(
                "click",
                (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    make(e);
                },
                {
                    capture: false,
                },
            );
            function codex() {
                code = document.createElement("code");
                const data = new FormData(document.querySelector('#ct'));
                const cs = data.get('mode');
                let hint = '';
                switch (cs) {
                    case 'cd':
                        hint = `由于条目已触达${data.get('point')=='f1'?-2:data.get('point')=='f2'?-10:-30}分的删除线，根据[[[/deletions-policy|删除政策]]]，据此宣告将${data.get('point')=='f1'?'于72小时后':data.get('point')=='f2'?'于24小时后':'立即'}删除此条目\n`;
                        break;
                    case 'ld':
                        hint = `由于条目已发布1个月，且分数并未达到合格线以上，根据[[[/deletions-policy|删除政策]]]，据此宣告将于72小时后删除此条目\n`;
                        break;
                    case 'fj':
                        hint= '此成员的封禁期将于以下倒计时结束后结束\n'
                }
                const toh = `[[iframe https://secretppl608.github.io/time.html?m=${cs}&t=${new Date(data.get('dt')).getTime()} style="width:400px;display:block;height:60px;"]]`;
                code.innerText = hint+toh;
                document.body.appendChild(code);
            }
            function make(e) {
                if (code == null) {
                    codex()
                } else {
                    code.remove();
                    codex()
                }
            }
        </script>
    </div>
    <div id="time">
        <div id="tips" class="will">以下倒计时将于如下时间后结束：</div>
        <div id="time-box">
            <div id="d" class="c">
                <div id="day" class="t">00</div>
                <span class="u">天</span>
                <div class="w"></div>
            </div>
            <div id="h" class="c">
                <div id="hours" class="t">00</div>
                <span class="u">时</span>
                <div class="w"></div>
            </div>
            <div id="m" class="c">
                <div id="minute" class="t">00</div>
                <span class="u">分</span>
                <div class="w"></div>
            </div>
            <div id="s" class="c">
                <div id="second" class="t">00</div>
                <span class="u">秒</span>
                <div class="w"></div>
            </div>
        </div>
    </div>
    <script>
        const t = document.querySelectorAll(".t");
        const shref = new URLSearchParams(location.search);
        const isT = shref.has("t") && shref.has("m");
        if (!isT) {
            document.querySelector("#time").style.display = "none";
        } else {
            document.querySelector("#control").style.display = "none";
        }
        const tt = Number(shref.get("t"));
        let tn = Date.now();
        let th = tt - tn;
        if(th<0){
            document.querySelector('#tips').classList.add('has');
            document.querySelector('#tips').innerText = '以下倒计时已于如下时间前结束：';
            th=tn-tt;
        }
        for (let i = t.length - 1; i >= 0; i--) {
            t[i].innerText =
                i == 3
                    ? Math.abs(
                        Math.floor(th / 1000) -
                        Math.floor(th / 1000 / 60 / 60 / 24) *
                        24 *
                        60 *
                        60 -
                        (Math.floor(th / 1000 / 60 / 60) -
                            Math.floor(th / 1000 / 60 / 60 / 24) * 24) *
                        60 *
                        60 -
                        (Math.floor(th / 1000 / 60) -
                            Math.floor(th / 1000 / 60 / 60 / 24) *
                            24 *
                            60 -
                            (Math.floor(th / 1000 / 60 / 60) -
                                Math.floor(th / 1000 / 60 / 60 / 24) *
                                24) *
                            60) *
                        60
                    )
                        .toString()
                        .padStart(2, 0)
                    : i == 2
                        ? Math.abs(
                            Math.floor(th / 1000 / 60) -
                            Math.floor(th / 1000 / 60 / 60 / 24) * 24 * 60 -
                            (Math.floor(th / 1000 / 60 / 60) -
                                Math.floor(th / 1000 / 60 / 60 / 24) * 24) *
                            60
                        )
                            .toString()
                            .padStart(2, 0)
                        : i == 1
                            ? Math.abs(
                                Math.floor(th / 1000 / 60 / 60) -
                                Math.floor(th / 1000 / 60 / 60 / 24) * 24
                            )
                                .toString()
                                .padStart(2, 0)
                            : Math.abs(Math.floor(th / 1000 / 60 / 60 / 24))
                                .toString()
                                .padStart(2, 0);
        }
        const to = setInterval(() => {
            let tn = Date.now();
            let th = tt - tn;
            if(th<0){
                document.querySelector('#tips').classList.add('has');
                document.querySelector('#tips').innerText = '以下倒计时已于如下时间前结束：';
                th = tn-tt;
            }
            for (let i = t.length - 1; i >= 0; i--) {
                t[i].innerText =
                    i == 3
                        ? Math.abs(
                            Math.floor(th / 1000) -
                            Math.floor(th / 1000 / 60 / 60 / 24) *
                            24 *
                            60 *
                            60 -
                            (Math.floor(th / 1000 / 60 / 60) -
                                Math.floor(th / 1000 / 60 / 60 / 24) *
                                24) *
                            60 *
                            60 -
                            (Math.floor(th / 1000 / 60) -
                                Math.floor(th / 1000 / 60 / 60 / 24) *
                                24 *
                                60 -
                                (Math.floor(th / 1000 / 60 / 60) -
                                    Math.floor(th / 1000 / 60 / 60 / 24) *
                                    24) *
                                60) *
                            60
                        )
                            .toString()
                            .padStart(2, 0)
                        : i == 2
                            ? Math.abs(
                                Math.floor(th / 1000 / 60) -
                                Math.floor(th / 1000 / 60 / 60 / 24) *
                                24 *
                                60 -
                                (Math.floor(th / 1000 / 60 / 60) -
                                    Math.floor(th / 1000 / 60 / 60 / 24) *
                                    24) *
                                60
                            )
                                .toString()
                                .padStart(2, 0)
                            : i == 1
                                ? Math.abs(
                                    Math.floor(th / 1000 / 60 / 60) -
                                    Math.floor(th / 1000 / 60 / 60 / 24) * 24
                                )
                                    .toString()
                                    .padStart(2, 0)
                                : Math.abs(Math.floor(th / 1000 / 60 / 60 / 24))
                                    .toString()
                                    .padStart(2, 0);
            }
        }, 1000);
    </script>
</body>

</html>
